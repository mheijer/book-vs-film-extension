<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book vs. Film xRay</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111;
      color: #eee;
      min-height: 100vh;
    }

    #header {
      background: #1a1a1a;
      padding: 14px 16px;
      border-bottom: 1px solid #2a2a2a;
    }

    #header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
    }

    #header .subtitle {
      font-size: 12px;
      color: #888;
      margin-top: 2px;
    }

    #content {
      padding: 16px;
    }

    /* Loading state */
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 16px;
      gap: 14px;
      color: #888;
      font-size: 14px;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #333;
      border-top-color: #e87c22;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Section blocks */
    .section {
      background: #1a1a1a;
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 12px;
    }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 8px;
    }

    .section p {
      font-size: 13px;
      line-height: 1.55;
      color: #ccc;
    }

    /* No book state */
    #no-book {
      text-align: center;
      padding: 32px 16px;
      color: #888;
      font-size: 14px;
    }

    /* Comparison rows */
    .comparison-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid #222;
    }

    .comparison-row:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .dim-label {
      font-size: 12px;
      font-weight: 600;
      color: #aaa;
      width: 72px;
      flex-shrink: 0;
      padding-top: 2px;
    }

    .dim-right {
      flex: 1;
    }

    .rating-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
      margin-bottom: 4px;
    }

    .rating-faithful   { background: #1a3a1a; color: #4caf50; }
    .rating-modified   { background: #3a2e00; color: #f5a623; }
    .rating-different  { background: #3a1a1a; color: #e05252; }

    .dim-detail {
      font-size: 12px;
      color: #999;
      line-height: 1.4;
    }

    /* Key difference callout */
    .key-difference {
      background: #1e1a2e;
      border-left: 3px solid #8b5cf6;
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 12px;
    }

    .key-difference .section-label {
      color: #8b5cf6;
      margin-bottom: 6px;
    }

    .key-difference p {
      font-size: 13px;
      color: #c4b5fd;
      line-height: 1.5;
    }

    /* Confidence indicator */
    .confidence-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0 4px;
    }

    .confidence-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #555;
      white-space: nowrap;
    }

    .confidence-dots {
      display: flex;
      gap: 4px;
    }

    .confidence-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #333;
    }

    .confidence-dot.filled-1, .confidence-dot.filled-2 { background: #e05252; }
    .confidence-dot.filled-3 { background: #f5a623; }
    .confidence-dot.filled-4, .confidence-dot.filled-5 { background: #4caf50; }

    .confidence-text {
      font-size: 11px;
      color: #555;
    }

    /* No book state */
    .no-book-message {
      text-align: center;
      padding: 24px 16px 8px;
      color: #888;
      font-size: 14px;
    }

    .override-form {
      padding: 12px 16px 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .override-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 2px;
    }

    .override-form input {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      padding: 8px 10px;
      color: #eee;
      font-size: 13px;
      outline: none;
      width: 100%;
    }

    .override-form input:focus {
      border-color: #8b5cf6;
    }

    .override-form button {
      background: #8b5cf6;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 9px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
    }

    .override-form button:hover {
      background: #7c3aed;
    }

    /* Two-column film vs book */
    .two-col {
      display: flex;
      gap: 0;
      padding: 0;
      overflow: hidden;
    }

    .two-col .col {
      flex: 1;
      padding: 14px;
    }

    .col-divider {
      width: 1px;
      background: #222;
      flex-shrink: 0;
    }

    /* Hidden by default */
    .hidden { display: none; }
  </style>
</head>
<body>

  <div id="header">
    <h1>📖 Book vs. Film</h1>
    <div class="subtitle" id="header-subtitle">Waiting for a pause...</div>
  </div>

  <div id="content">

    <div id="loading" class="hidden">
      <div class="spinner"></div>
      <span>Analyzing scene...</span>
    </div>

    <div id="no-book" class="hidden">
      <div class="no-book-message">No source book detected for this title.</div>
      <div style="text-align:center; padding: 0 16px 8px;">
        <button id="retry-btn" style="display:none; background:#333; color:#eee; border:1px solid #444; border-radius:6px; padding:8px 20px; font-size:13px; cursor:pointer;">Try again</button>
      </div>
      <div class="override-form">
        <div class="override-label">Know the source book?</div>
        <input id="override-title" type="text" placeholder="Book title" />
        <input id="override-author" type="text" placeholder="Author" />
        <button id="override-submit">Analyze →</button>
      </div>
    </div>

    <div id="results" class="hidden">

      <div id="key-difference-block" class="key-difference" style="display:none">
        <div class="section-label">Key Difference</div>
        <p id="key-difference-text"></p>
      </div>

      <div class="section">
        <div class="section-label">Breakdown</div>
        <div id="comparison-rows"></div>
        <div class="confidence-bar">
          <span class="confidence-label">AI Confidence</span>
          <div class="confidence-dots" id="confidence-dots"></div>
          <span class="confidence-text" id="confidence-text"></span>
        </div>
      </div>

      <div class="section two-col">
        <div class="col">
          <div class="section-label">Film</div>
          <p id="scene-description"></p>
        </div>
        <div class="col-divider"></div>
        <div class="col">
          <div class="section-label">Book</div>
          <p id="book-passage"></p>
        </div>
      </div>

    </div>

  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
